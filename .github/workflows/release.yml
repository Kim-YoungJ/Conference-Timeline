name: Release

# Build Windows / macOS / Linux installers whenever a version tag is pushed,
# then attach them to a draft GitHub Release.
#   git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # also allow running manually from the Actions tab

jobs:
  release:
    permissions:
      contents: write # needed to create the release and upload assets
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'   # one universal .dmg for Intel + Apple Silicon
            args: '--target universal-apple-darwin'
          - platform: 'ubuntu-22.04'   # .deb / .rpm / .AppImage
            args: ''
          - platform: 'windows-latest' # .msi / .exe
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf file

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # both arches so macOS can produce a universal binary
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Conference Timeline ${{ github.ref_name }}'
          releaseBody: 'Download the installer for your OS from the assets below.'
          releaseDraft: true # review, then publish manually
          prerelease: false
          args: ${{ matrix.args }}
